<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prova de Termologia</title>

<style>
body {
    font-family: Arial;
    background: #f0f0f0;
    padding: 20px;
}

.questao {
    background: white;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 8px;
}

input {
    padding: 5px;
    width: 120px;
}

button {
    padding: 10px 20px;
    font-size: 16px;
}

.erro {
    color: red;
    font-size: 14px;
}
</style>
</head>

<body>

<h1>Prova de Física - Termologia</h1>

<div id="prova"></div>

<button onclick="corrigir()">Corrigir</button>

<div id="resultado"></div>

<script>
const questoes = [

{q:"1) Um termômetro marca 20°C. Converta essa temperatura para Fahrenheit. Considere F = (9/5)C + 32.", r:68},

{q:"2) Um dia está com temperatura de 68°F. Converta para Celsius.", r:20},

{q:"3) Um laboratório registra 300 K. Converta para Celsius. (K = C + 273)", r:27},

{q:"4) A temperatura de um corpo varia de 20°C para 30°C. Determine a variação de temperatura.", r:10},

{q:"5) Uma barra de 2 m sofre aumento de temperatura de 10°C. Coeficiente linear = 0,01. Calcule a dilatação linear.", r:0.2},

{q:"6) Uma chapa de área 5 m² sofre variação de temperatura de 10°C. Coeficiente superficial = 0,02. Calcule a dilatação.", r:1},

{q:"7) Um bloco de volume 2 m³ sofre variação de 10°C. Coeficiente volumétrico = 0,03. Calcule a dilatação.", r:0.6},

{q:"8) Uma barra mede 1 m a 0°C. Com aquecimento de 10°C e coeficiente 0,01, qual será o comprimento final?", r:1.1},

{q:"9) Dois metais diferentes formam uma lâmina bimetálica. Ao aquecer, qual lado dilata mais: o de maior coeficiente (responda 1 para sim)?", r:1},

{q:"10) Um líquido aumenta seu volume em 0,5 m³ ao ser aquecido. Qual foi a dilatação aparente?", r:0.5},

{q:"11) Um recipiente também dilata 0,1 m³. Qual a dilatação real do líquido?", r:0.6},

{q:"12) A água apresenta comportamento anômalo entre 0°C e 4°C. Ao aquecer nesse intervalo, o volume aumenta? (1 sim / 0 não)", r:0},

{q:"13) A água atinge densidade máxima a quantos graus Celsius?", r:4},

{q:"14) Um corpo está a 0°C. Qual sua temperatura em Kelvin?", r:273},

{q:"15) Um corpo está a 100°C. Qual em Kelvin?", r:373},

{q:"16) Converta 50°C para Fahrenheit.", r:122},

{q:"17) Uma barra de 3 m sofre ΔT=10 e coef=0,01. Calcule ΔL.", r:0.3},

{q:"18) Área inicial 2 m², coef=0,02, ΔT=10. ΔA?", r:0.4},

{q:"19) Volume inicial 1 m³, coef=0,03, ΔT=10. ΔV?", r:0.3},

{q:"20) Um termômetro varia de 10°C para 40°C. Qual a variação em Fahrenheit?", r:54}

];

const prova = document.getElementById("prova");

questoes.forEach((item,i)=>{
    const div = document.createElement("div");
    div.className = "questao";
    div.innerHTML = `
        <p>${item.q}</p>
        <input type="number" step="0.01" id="q${i}">
        <div id="erro${i}" class="erro"></div>
    `;
    prova.appendChild(div);
});

function corrigir(){
    let acertos = 0;
    let erros = 0;

    questoes.forEach((item,i)=>{
        const valor = parseFloat(document.getElementById("q"+i).value);
        const erroDiv = document.getElementById("erro"+i);

        erroDiv.innerText = "";

        if(isNaN(valor)){
            erros++;
            erroDiv.innerText = "Resposta vazia";
            return;
        }

        if(Math.abs(valor - item.r) < 0.01){
            acertos++;
            return;
        }

        erros++;
        erroDiv.innerText = "Correto: " + item.r;
    });

    document.getElementById("resultado").innerText =
        "Acertos: " + acertos + " | Erros: " + erros;
}
</script>

</body>
</html>
